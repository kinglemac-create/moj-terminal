<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPHA TERMINAL | Live Market Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0f;
            --card-bg: rgba(20, 20, 25, 0.8);
            --border-color: #2a2a35;
            --text-main: #e0e0e0;
            --text-muted: #888;
            --bullish: #00ff88;
            --bearish: #ff4444;
            --neutral: #ffcc00;
            --accent: #1e90ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            line-height: 1.5;
            -webkit-user-select: none;
        }

        header {
            padding: 10px 20px;
            background: rgba(10, 10, 15, 0.9);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0; z-index: 100;
            backdrop-filter: blur(10px);
        }

        .terminal-logo { font-family: 'JetBrains Mono', monospace; font-weight: bold; color: var(--bullish); }

        .market-info {
            display: flex; gap: 20px; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem;
        }

        #breaking-banner {
            background: #ff4444; color: white; padding: 5px; text-align: center;
            font-weight: bold; display: none; animation: blink 1.5s infinite;
        }
        @keyframes blink { 0% {opacity:1} 50% {opacity:0.5} 100% {opacity:1} }

        .container {
            display: grid; grid-template-columns: 280px 1fr 300px; gap: 15px;
            padding: 15px; height: calc(100vh - 70px);
        }

        .sidebar {
            background: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 8px; padding: 15px; overflow-y: auto;
        }

        .feed-container { overflow-y: auto; padding-right: 10px; }

        .news-card {
            background: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 8px; padding: 15px; margin-bottom: 12px;
            position: relative; border-left: 4px solid var(--accent);
        }

        .impact-badge {
            float: right; font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem; padding: 2px 6px; border-radius: 4px;
            background: rgba(255,255,255,0.1);
        }

        .news-title {
            font-weight: 600; font-size: 1.05rem; color: #fff;
            text-decoration: none; display: block; margin: 10px 0;
        }

        .news-meta { font-size: 0.75rem; color: var(--text-muted); }

        .tab {
            padding: 8px; background: #1a1a25; border-radius: 4px;
            cursor: pointer; margin-bottom: 5px; font-size: 0.85rem;
        }
        .tab.active { border: 1px solid var(--accent); color: var(--accent); }

        .ticker-tag {
            display: inline-block; background: #2a2a35; padding: 2px 8px;
            border-radius: 4px; margin: 2px; font-size: 0.8rem; cursor: pointer;
        }

        input {
            width: 100%; padding: 8px; background: #1a1a25; border: 1px solid var(--border-color);
            color: white; border-radius: 4px; margin-bottom: 10px;
        }

        @media (max-width: 1024px) {
            .container { grid-template-columns: 1fr; }
            .right-panel, .sidebar { display: none; }
            .sidebar.mobile-show { display: block; }
        }
    </style>
</head>
<body>

<div id="breaking-banner">⚠️ MARKET ALERT: HIGH VOLATILITY DETECTED</div>

<header>
    <div class="terminal-logo">ALPHA_TERMINAL v1.1</div>
    <div class="market-info">
        <span id="timer">REFRESH: 05:00</span>
        <span id="clock">00:00:00 UTC</span>
    </div>
</header>

<div class="container">
    <aside class="sidebar">
        <h3>Categories</h3><br>
        <div class="tab active" onclick="filterFeed('all')">🌍 All Intelligence</div>
        <div class="tab" onclick="filterFeed('usa')">🇺🇸 US Markets</div>
        <div class="tab" onclick="filterFeed('macro')">📉 Macro / Central Banks</div>
        <br>
        <h3>Watchlist</h3><br>
        <input type="text" id="tickerInput" placeholder="Add Ticker (eg. NVDA)">
        <div id="watchlistContainer" class="watchlist-items"></div>
    </aside>

    <main class="feed-container">
        <div id="news-feed">
            <div style="text-align:center; padding:50px; color:var(--text-muted);">
                Connecting to global financial feeds via CORSProxy...
            </div>
        </div>
    </main>

    <aside class="sidebar right-panel">
        <h3>Watchlist Alerts</h3>
        <div id="alert-history" style="font-size: 0.8rem; color: var(--text-muted); margin-top:10px;">
            No mentions yet.
        </div>
    </aside>
</div>

<script>
    // 1. IZVORI VIJESTI
    const SOURCES = [
        { name: 'Yahoo Finance', url: 'https://finance.yahoo.com/news/rssindex', cat: 'usa' },
        { name: 'CNBC', url: 'https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=wrss01&id=100003114', cat: 'usa' },
        { name: 'MarketWatch', url: 'https://feeds.content.dowjones.io/public/rss/mw_topstories', cat: 'macro' }
    ];

    let watchlist = JSON.parse(localStorage.getItem('alpha_watchlist')) || ['NVDA', 'FED', 'BTC'];
    let newsDatabase = [];
    let countdown = 300;

    // 2. GLAVNA FUNKCIJA ZA POVLAČENJE VIJESTI
    async function fetchNews() {
        const proxy = "https://corsproxy.io/?"; 
        let allItems = [];

        for (const source of SOURCES) {
            try {
                // Dodajemo timestamp na URL da izbjegnemo stare (cached) vijesti
                const targetUrl = encodeURIComponent(source.url + "?t=" + Date.now());
                const response = await fetch(`${proxy}${targetUrl}`);
                const text = await response.text();
                
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(text, "text/xml");
                const items = xmlDoc.querySelectorAll("item");

                items.forEach(el => {
                    const title = el.querySelector("title").textContent;
                    const link = el.querySelector("link").textContent;
                    const pubDate = el.querySelector("pubDate") ? el.querySelector("pubDate").textContent : "";
                    
                    if (!newsDatabase.some(n => n.link === link)) {
                        const analysis = analyzeNews(title);
                        allItems.push({ title, link, pubDate, source: source.name, category: source.cat, ...analysis });
                    }
                });
            } catch (e) {
                console.error("Error fetching " + source.name, e);
            }
        }

        if (allItems.length > 0) {
            newsDatabase = [...allItems, ...newsDatabase].slice(0, 100);
            renderFeed(newsDatabase);
            checkWatchlist(allItems);
        } else if (newsDatabase.length === 0) {
            document.getElementById('news-feed').innerHTML = "<div style='text-align:center; padding:50px;'>No news found. Checking again in 5 min.</div>";
        }
    }

    // 3. ANALIZA SENTIMENTA
    function analyzeNews(title) {
        const t = title.toLowerCase();
        let sentiment = "NEUTRAL";
        let score = Math.floor(Math.random() * 3) + 4;

        if (t.includes('surge') || t.includes('rise') || t.includes('growth') || t.includes('profit')) {
            sentiment = "BULLISH"; score += 2;
        } else if (t.includes('fall') || t.includes('drop') || t.includes('crash') || t.includes('inflation')) {
            sentiment = "BEARISH"; score += 3;
        }

        return { score, sentiment };
    }

    // 4. PRIKAZ NA EKRANU
    function renderFeed(items) {
        const container = document.getElementById('news-feed');
        container.innerHTML = items.map(item => `
            <div class="news-card" style="border-left-color: ${item.sentiment === 'BULLISH' ? 'var(--bullish)' : (item.sentiment === 'BEARISH' ? 'var(--bearish)' : 'var(--accent)')}">
                <span class="impact-badge">${item.sentiment} | Impact: ${item.score}</span>
                <div class="news-meta">${item.source} • ${item.pubDate}</div>
                <a href="${item.link}" target="_blank" class="news-title">${item.title}</a>
            </div>
        `).join('');
    }

    // 5. WATCHLIST LOGIKA
    function checkWatchlist(newItems) {
        newItems.forEach(item => {
            watchlist.forEach(ticker => {
                if (item.title.toUpperCase().includes(ticker.toUpperCase())) {
                    const history = document.getElementById('alert-history');
                    const div = document.createElement('div');
                    div.style.color = "var(--bullish)";
                    div.innerHTML = `<strong>[${ticker}]</strong> mention in news!`;
                    history.prepend(div);
                    
                    if (Notification.permission === "granted") {
                        new Notification("WATCHLIST ALERT", { body: item.title });
                    }
                }
            });
        });
    }

    // 6. POMOĆNE FUNKCIJE
    function updateClock() {
        document.getElementById('clock').innerText = new Date().toISOString().split('T')[1].split('.')[0] + " UTC";
    }

    function startTimer() {
        setInterval(() => {
            countdown--;
            let mins = Math.floor(countdown / 60);
            let secs = countdown % 60;
            document.getElementById('timer').innerText = `REFRESH: ${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
            if (countdown <= 0) { countdown = 300; fetchNews(); }
        }, 1000);
    }

    document.getElementById('tickerInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const val = e.target.value.toUpperCase().trim();
            if (val && !watchlist.includes(val)) {
                watchlist.push(val);
                localStorage.setItem('alpha_watchlist', JSON.stringify(watchlist));
                renderWatchlist();
                e.target.value = '';
            }
        }
    });

    function renderWatchlist() {
        document.getElementById('watchlistContainer').innerHTML = watchlist.map(t => `<span class="ticker-tag">${t}</span>`).join('');
    }

    // START
    window.onload = () => {
        renderWatchlist();
        fetchNews();
        startTimer();
        setInterval(updateClock, 1000);
        if ("Notification" in window) Notification.requestPermission();
    };
</script>
</body>
</html>
