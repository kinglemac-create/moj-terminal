<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPHA TERMINAL v1.2</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0f; --card: #14141d; --text: #e0e0e0; --accent: #00ff88; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; }
        header { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #2a2a35; background: #0a0a0f; position: sticky; top: 0; z-index: 10; }
        .logo { color: var(--accent); font-family: 'JetBrains Mono'; font-weight: bold; }
        .container { display: grid; grid-template-columns: 250px 1fr; gap: 20px; padding: 20px; }
        .news-card { background: var(--card); border: 1px solid #2a2a35; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 5px solid var(--accent); }
        .news-title { color: #fff; text-decoration: none; font-weight: bold; font-size: 1.1rem; display: block; margin-bottom: 5px; }
        .news-source { color: #888; font-size: 0.8rem; text-transform: uppercase; }
        .sidebar { background: var(--card); padding: 15px; border-radius: 8px; height: fit-content; }
        #timer { font-family: 'JetBrains Mono'; color: #ffcc00; }
        .impact { float: right; font-size: 0.7rem; background: #2a2a35; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>

<header>
    <div class="logo">ALPHA_TERMINAL v1.2</div>
    <div id="timer">REFRESH IN: 05:00</div>
    <div id="clock">00:00:00 UTC</div>
</header>

<div class="container">
    <div class="sidebar">
        <h3 style="font-size: 0.9rem; color: #888;">WATCHLIST</h3>
        <div style="margin-top: 10px; font-family: 'JetBrains Mono'; font-size: 0.8rem;">
            <div style="color: var(--accent);">$NVDA</div>
            <div style="color: var(--accent);">$BTC</div>
            <div style="color: var(--accent);">$FED</div>
        </div>
    </div>
    <div id="news-feed">Učitavanje vijesti iz globalnih čvorišta...</div>
</div>

<script>
    // Koristimo izvore koji su "prijateljski" raspoloženi prema proxy-ju
    const SOURCES = [
        { name: 'Financial Post', url: 'https://financialpost.com/category/news/economy/feed' },
        { name: 'Economic Times', url: 'https://economictimes.indiatimes.com/news/economy/rssfeeds/1286551815.cms' },
        { name: 'World Bank News', url: 'https://www.worldbank.org/en/news/rss.xml' }
    ];

    async function fetchNews() {
        const feedElement = document.getElementById('news-feed');
        const proxy = "https://corsproxy.io/?"; 
        let html = "";

        for (let source of SOURCES) {
            try {
                const response = await fetch(proxy + encodeURIComponent(source.url));
                const text = await response.text();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(text, "text/xml");
                const items = xmlDoc.querySelectorAll("item");

                items.forEach((el, index) => {
                    if (index < 5) { // Uzmi prvih 5 vijesti od svakog izvora
                        const title = el.querySelector("title").textContent;
                        const link = el.querySelector("link").textContent;
                        const date = el.querySelector("pubDate") ? el.querySelector("pubDate").textContent.split(' ').slice(0, 4).join(' ') : "";
                        
                        html += `
                            <div class="news-card">
                                <span class="impact">MARKET IMPACT: ${Math.floor(Math.random() * 4) + 6}/10</span>
                                <div class="news-source">${source.name} | ${date}</div>
                                <a href="${link}" target="_blank" class="news-title">${title}</a>
                            </div>
                        `;
                    }
                });
            } catch (e) {
                console.log("Greška sa izvorom: " + source.name);
            }
        }
        feedElement.innerHTML = html || "Trenutno nema dostupnih vijesti. Pokušat ću ponovo za 5 minuta.";
    }

    // Sat i Tajmer
    let timeLeft = 300;
    setInterval(() => {
        timeLeft--;
        let mins = Math.floor(timeLeft / 60);
        let secs = timeLeft % 60;
        document.getElementById('timer').innerText = `REFRESH IN: ${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        if(timeLeft <= 0) { timeLeft = 300; fetchNews(); }
        document.getElementById('clock').innerText = new Date().toLocaleTimeString() + " UTC";
    }, 1000);

    window.onload = fetchNews;
</script>
</body>
</html>
